# Coqui XTTS v2 Fine-tuning Configuration
# Target: RunPod RTX 4090 (24GB VRAM)

# Model
base_model: "tts_models/multilingual/multi-dataset/xtts_v2"

# Data
dataset_path: "/workspace/training_data/xtts"
language: "th"

# Training (RTX 4090 24GB)
epochs: 50
batch_size: 8
eval_batch_size: 4
learning_rate: 5.0e-6
grad_accumulation_steps: 1
mixed_precision: true
num_workers: 4

# XTTS-specific
bpe_tokenizer: true          # important for Thai language

# Checkpointing
output_dir: "/workspace/checkpoints/xtts"
